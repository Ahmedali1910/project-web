<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <br>

    <center>
    <form method="post" action="home_user.html" >
 <h4>Username : <input type="text" size="10" maxlength="40" name="username" required minlength="3" placeholder="Enter username"> </h4>

 <h4>Email : <input type="email" size="10" maxlength="40" name="email" required placeholder="Enter email"> </h4>

 <h4>Password : <input type="password" size="10" maxlength="40" name="password"  required minlength="8" placeholder="Enter password"> </h4>

 <h4>Confirm Password : <input type="password" size="10" maxlength="40" name="Confirm_password"  required minlength="8" placeholder="Confirm password"> </h4>

<h4>User type : <input type="radio"  name="user_type " value="admin" required> Admin 

<input type="radio"  name="user_type " value="user"> User </h4>

<button  type="submit">🔑 Sign in</button>


<p> Already have an account ? <button> <a href="login.html">➜] login  </a> </button>  </p>

    </form>
