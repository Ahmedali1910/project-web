<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
     <title>signup </title>
</head>
<body>
    <br>
<div class="container"  >
    
<form method="post" action="home_user.html" >

<div class="form-group">
<label>Username : </label>
<input type="text" size="10" maxlength="40" name="username" required minlength="3" placeholder="Enter username">
</div>

<div class="form-group">
 <label>Email : </label>
 <input type="email" size="10" maxlength="40" name="email" required placeholder="Enter email">
</div>

<div class="form-group">
 <label>Password :</label> 
 <input type="password" size="10" maxlength="40" name="password"  required minlength="8" placeholder="Enter password"> 
</div>

<div class="form-group">
 <label>Confirm Password : </label>
 <input type="password" size="10" maxlength="40" name="Confirm_password"  required minlength="8" placeholder="Confirm password"> 
</div>

<div class="radio-group">
            <label>User type:</label>
            <input type="radio" name="user_type" value="admin" required> Admin
            <input type="radio" name="user_type" value="user"> User
</div>


<button type="submit" class="button-signup">
            🔑 Sign up
        </button>

        <p>
            Already have an account? 
            <button type="button" class="bt-login">
                <a href="login.html">➜] Login</a>
            </button>
        </p>


</form>

</div>


</body>
</html>
