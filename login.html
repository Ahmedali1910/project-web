<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login</title>
</head>
<body>

<div class="container">
    <nav>
        <button ><a href="admin.html" class="adminlogin" >👨🏻‍💼 Admin Login </a></button>
    </nav>

    <form method="post" action="home_user.html">
        <div class="form-group">
            <label>Email :</label>
            <input type="email" name="email" required placeholder="Enter email">
        </div>

        <div class="form-group">
            <label>Password :</label>
            <input type="password" name="password" required minlength="8" placeholder="Enter password">
        </div>

        <button type="submit">➜] Login</button>
        
        <p>Don't have an account? 
            <button type="button"><a href="signin.html">🔑 Sign up</a></button>
        </p>
    </form>
</div>

</body>
</html>
